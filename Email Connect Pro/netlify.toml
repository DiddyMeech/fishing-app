[build]
  command = "npm run build"
  publish = "dist"

# Allow iframe embedding by the parent site.
# Replace https://YOUR-PARENT-SITE.com with your actual domain.
[[headers]]
  for = "/*"
  [headers.values]
    # Remove any default X-Frame-Options that would block embedding
    X-Frame-Options = ""
    # Allow framing by your parent domain only
    Content-Security-Policy = "frame-ancestors 'self' https://YOUR-PARENT-SITE.com"
    # Allow cross-origin access for the embed
    Access-Control-Allow-Origin = "https://YOUR-PARENT-SITE.com"
